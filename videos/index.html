<!doctype html>
<html lang="en">
  <head>
    
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta charset="utf-8" />

    <link rel="icon" type="image/png" href="../assets/images/mr-monkey-logo.png" />

    <link rel="canonical" href="https://www.mrmonkey.ca/videos/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="YouTube | Mr. Monkey" />
    <meta property="og:description" content="Featured YouTube videos from Mr. Monkey." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Go to home">
        <span class="brand-mark" data-brand-initials>MM</span>
        <span data-site-name>Mr. Monkey</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/creations/">Creations</a>
        <a href="/videos/">YouTube</a>
        <a href="/updates/">Updates</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
      </nav>
    </header>

    <main>
      <section class="section page-hero">
        <p class="eyebrow">YouTube</p>
        <h1>Featured videos</h1>
        <p>Watch Mr. Monkey uploads, Minecraft videos, shorts, challenges, and channel highlights.</p>
        <a class="button primary" data-youtube-channel href="#" target="_blank" rel="noreferrer">Visit channel</a>
      </section>

      <section class="section">
        <div class="video-grid" data-videos></div>
      </section>

      <section class="section playlist-section" aria-label="Browse playlists">
        <div class="section-heading">
          <p class="eyebrow">Playlists</p>
          <h2>Browse My Playlists</h2>
        </div>
        <div class="playlist-list" data-playlists></div>
      </section>
    </main>

    <footer class="site-footer">
      <span data-footer-name>Mr. Monkey</span>
    </footer>

    <script src="../assets/js/site-data.js"></script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Featured YouTube videos from Mr. Monkey." />
    <title>YouTube | Mr. Monkey</title>
    <link rel="icon" type="image/png" href="../assets/images/mr-monkey-logo.png" />
    <link rel="apple-touch-icon" href="../assets/images/mr-monkey-logo.png" />
    <link rel="canonical" href="https://www.mrmonkey.ca/videos/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="YouTube | Mr. Monkey" />
    <meta property="og:description" content="Featured YouTube videos from Mr. Monkey." />
    <meta property="og:url" content="https://www.mrmonkey.ca/videos/" />
    <meta property="og:image" content="https://www.mrmonkey.ca/assets/images/hero-minecraft.png" />
    <meta property="og:image:alt" content="Mr. Monkey YouTube videos preview" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="YouTube | Mr. Monkey" />
    <meta name="twitter:description" content="Featured YouTube videos from Mr. Monkey." />
    <meta name="twitter:image" content="https://www.mrmonkey.ca/assets/images/hero-minecraft.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script src="https://apis.google.com/js/platform.js" async defer></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Go to home">
        <span class="brand-mark" data-brand-initials>MM</span>
        <span data-site-name>Mr. Monkey</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/creations/">Creations</a>
        <a href="/videos/">YouTube</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
      </nav>
    </header>

    <main>
      <section class="section page-hero">
        <p class="eyebrow">YouTube</p>
        <h1>Featured videos</h1>
        <p>Watch Mr. Monkey uploads, Minecraft videos, shorts, challenges, and channel highlights.</p>
        <div class="subscribe-widget" data-subscribe-widget aria-label="Subscribe to Mr. Monkey on YouTube">
          <div
            class="g-ytsubscribe"
            data-channelid="UCRPfEI90TUrGycrAbqZUSTg"
            data-layout="full"
            data-count="default"
          ></div>
          <a
            class="button primary subscribe-fallback"
            data-subscribe-fallback
            href="https://www.youtube.com/channel/UCRPfEI90TUrGycrAbqZUSTg?sub_confirmation=1"
            target="_blank"
            rel="noreferrer"
          >
            Subscribe on YouTube
          </a>
        </div>
      </section>

      <section class="section">
        <div class="video-grid" data-videos></div>
      </section>

      <section class="section playlist-section" aria-label="Browse playlists">
        <div class="section-heading">
          <p class="eyebrow">Playlists</p>
          <h2>Browse My Playlists</h2>
        </div>
        <div class="playlist-list" data-playlists></div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="footer-note">&copy; 2026 Mr. Monkey</p>
      <div class="footer-socials" data-footer-socials aria-label="Social links"></div>
    </footer>

    <script src="../assets/js/site-data.js"></script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="The page you were looking for does not exist on the Mr. Monkey website."
    />
    <title>Page Not Found | Mr. Monkey</title>
    <link rel="icon" type="image/png" href="assets/images/mr-monkey-logo.png" />
    <link rel="apple-touch-icon" href="assets/images/mr-monkey-logo.png" />
    <link rel="canonical" href="https://www.mrmonkey.ca/404.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Page Not Found | Mr. Monkey" />
    <meta
      property="og:description"
      content="This Mr. Monkey page fell into the void. Return home or browse Minecraft creations."
    />
    <meta property="og:url" content="https://www.mrmonkey.ca/404.html" />
    <meta property="og:image" content="https://www.mrmonkey.ca/assets/images/hero-minecraft.png" />
    <meta property="og:image:alt" content="Mr. Monkey 404 page preview" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Page Not Found | Mr. Monkey" />
    <meta
      name="twitter:description"
      content="This Mr. Monkey page fell into the void. Return home or browse Minecraft creations."
    />
    <meta name="twitter:image" content="https://www.mrmonkey.ca/assets/images/hero-minecraft.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <style>
      body {
        margin: 0;
        background: #172231;
        color: #fffdf8;
        font-family: Inter, system-ui, sans-serif;
      }

      .site-header,
      .site-nav,
      .brand,
      .hero-actions,
      .site-footer {
        display: flex;
        align-items: center;
      }

      .site-header {
        position: sticky;
        top: 0;
        z-index: 20;
        justify-content: space-between;
        gap: 24px;
        padding: 18px clamp(18px, 4vw, 56px);
        border-bottom: 1px solid rgba(247, 244, 232, 0.1);
        background: rgba(10, 14, 18, 0.78);
      }

      .brand,
      .site-nav a,
      .button,
      .text-link {
        color: inherit;
        text-decoration: none;
      }

      .brand {
        gap: 10px;
        font-weight: 800;
      }

      .brand-mark {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 2px solid #00d9f6;
        border-radius: 50%;
        background: linear-gradient(145deg, #07111f, #008fb0);
        font-weight: 900;
      }

      .site-nav {
        gap: 8px;
      }

      .site-nav a {
        padding: 10px 12px;
        border-radius: 8px;
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
      }

      .not-found-page {
        position: relative;
        display: grid;
        min-height: calc(100vh - 170px);
        place-items: center;
        padding: clamp(38px, 5vw, 68px) clamp(18px, 5vw, 72px);
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 38%, rgba(0, 217, 246, 0.18), transparent 28%),
          radial-gradient(circle at 30% 70%, rgba(217, 152, 47, 0.12), transparent 24%),
          linear-gradient(180deg, #172231, #0f1724);
      }

      .not-found-content {
        position: relative;
        z-index: 1;
        max-width: 780px;
        text-align: center;
        animation: void-enter 720ms ease-out both;
      }

      .eyebrow {
        margin: 0 0 14px;
        color: #66ecff;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 940px;
        margin: 0 auto 18px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3rem, 7vw, 6rem);
        font-style: italic;
        line-height: 0.9;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.62), 0 0 34px rgba(0, 217, 246, 0.24);
      }

      p {
        color: #d6dce5;
        line-height: 1.7;
      }

      .hero-actions {
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        border-radius: 8px;
        background: #00d9f6;
        color: #10130f;
        font-weight: 800;
      }

      .text-link {
        color: #66ecff;
        font-weight: 800;
        text-decoration: underline;
        text-underline-offset: 4px;
      }

      .site-footer {
        justify-content: space-between;
        padding: 26px clamp(18px, 5vw, 72px);
        border-top: 1px solid rgba(247, 244, 232, 0.1);
        color: #d6dce5;
        font-weight: 700;
      }

      @keyframes void-enter {
        from {
          opacity: 0;
          transform: translateY(22px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 640px) {
        .site-nav {
          display: none;
        }

        .not-found-content {
          text-align: left;
        }

        .hero-actions {
          align-items: stretch;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Go to home">
        <span class="brand-mark" data-brand-initials>MM</span>
        <span data-site-name>Mr. Monkey</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/creations/">Creations</a>
        <a href="/videos/">YouTube</a>
        <a href="/updates/">Updates</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
      </nav>
    </header>

    <main>
      <section class="section not-found-page" aria-labelledby="not-found-title">
        <div class="void-particles" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="floating-block" aria-hidden="true"></div>
        <div class="not-found-content">
          <p class="eyebrow">404 Error</p>
          <h1 id="not-found-title">This Page Fell Into the Void</h1>
          <p>
            The page you were looking for does not exist, was moved, or may have been destroyed by a
            creeper.
          </p>
          <div class="hero-actions">
            <a class="button primary" href="/">Return Home</a>
            <a class="text-link" href="/creations/">View Creations</a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <span data-footer-name>Mr. Monkey</span>
    </footer>

    <script src="assets/js/site-data.js"></script>
    <script src="assets/js/script.js"></script>
  </body>
</html>

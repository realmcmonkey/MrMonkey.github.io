<!doctype html>
<html lang="en">
  <head>
    
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Minecraft creations, custom items, builds, and future downloads from Mr. Monkey."
    />
    <title>Creations | Mr. Monkey</title>
    <link rel="icon" type="image/png" href="../assets/images/mr-monkey-logo.png" />
    <link rel="apple-touch-icon" href="../assets/images/mr-monkey-logo.png" />
    <link rel="canonical" href="https://www.mrmonkey.ca/creations/" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Creations | Mr. Monkey" />
    <meta
      property="og:description"
      content="Minecraft creations, custom items, builds, and future downloads from Mr. Monkey."
    />
    <meta property="og:url" content="https://www.mrmonkey.ca/creations/" />
    <meta
      property="og:image"
      content="https://www.mrmonkey.ca/assets/images/minute-to-win-it-minecraft-edition.png"
    />
    <meta property="og:image:alt" content="Mr. Monkey Minecraft creations preview" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Creations | Mr. Monkey" />
    <meta
      name="twitter:description"
      content="Minecraft creations, custom items, builds, and future downloads from Mr. Monkey."
    />
    <meta
      name="twitter:image"
      content="https://www.mrmonkey.ca/assets/images/minute-to-win-it-minecraft-edition.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="Go to home">
        <span class="brand-mark" data-brand-initials>MM</span>
        <span data-site-name>Mr. Monkey</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/creations/">Creations</a>
        <a href="/videos/">YouTube</a>
        <a href="/about/">About</a>
        <a href="/contact/">Contact</a>
      </nav>
    </header>

    <main class="creation-store">
      <section class="store-intro">
        <div class="store-intro-copy">
          <p class="eyebrow">Creations</p>
          <h1>Minecraft creations</h1>
          <p>Custom items, builds, maps, worlds, screenshots, and future downloads all live here.</p>
        </div>
        <span class="store-intro-index" aria-hidden="true">MM</span>
      </section>

      <section class="store-catalogue" aria-label="Project library">
        <div class="store-toolbar">
          <div class="store-current">
            <p class="eyebrow">Browse</p>
            <h2 data-project-heading>Creations</h2>
          </div>
          <div class="project-controls" aria-label="Creation browsing controls">
            <div class="filters" aria-label="Portfolio filters" data-project-filters></div>
            <label class="sort-control">
              <span>Sort</span>
              <select data-project-sort aria-label="Sort creations">
                <option value="created">Newest Creations</option>
                <option value="updated">Recently Updated</option>
              </select>
            </label>
          </div>
        </div>
        <div class="card-grid creations-list" data-projects></div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="footer-note">&copy; 2026 Mr. Monkey</p>
      <div class="footer-socials" data-footer-socials aria-label="Social links"></div>
    </footer>

    <script src="../assets/js/site-data.js"></script>
    <script src="../assets/js/script.js"></script>
  </body>
</html>
